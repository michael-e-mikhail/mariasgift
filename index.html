<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday ya Maria!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neon-pink: #ff2a6d;
            --neon-blue: #05d9e8;
            --neon-purple: #d300c5;
            --neon-yellow: #f9f871;
            --dark-bg: #0d0221;
            --grid-color: rgba(5, 217, 232, 0.1);
        }

        /* Respect user's motion preferences */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        body {
            background: var(--dark-bg);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            position: relative;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Animated Grid Background */
        .grid {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            animation: gridMove 20s linear infinite;
            z-index: 0;
            will-change: transform;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px) translateZ(-200px); }
        }

        /* Binary Rain Effect */
        .binary-rain {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
            opacity: 0.3;
            pointer-events: none;
        }

        .binary-column {
            position: absolute;
            top: -100%;
            font-size: 14px;
            color: var(--neon-blue);
            text-shadow: 0 0 5px var(--neon-blue);
            animation: fall linear infinite;
            white-space: nowrap;
            writing-mode: vertical-rl;
            text-orientation: upright;
            letter-spacing: 5px;
            will-change: transform;
        }

        @keyframes fall {
            to { transform: translateY(200vh); }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 40px;
            max-width: 90vw;
        }

        /* Glitch Effect for HAPPY BIRTHDAY */
        .glitch-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .glitch {
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: bold;
            text-transform: uppercase;
            position: relative;
            text-shadow: 
                0.05em 0 0 var(--neon-pink),
                -0.025em -0.05em 0 var(--neon-blue),
                0.025em 0.05em 0 var(--neon-purple);
            animation: glitch 2s infinite;
            color: white;
            letter-spacing: 0.1em;
        }

        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 var(--neon-pink), -0.05em -0.025em 0 var(--neon-blue), -0.025em 0.05em 0 var(--neon-purple); }
            14% { text-shadow: 0.05em 0 0 var(--neon-pink), -0.05em -0.025em 0 var(--neon-blue), -0.025em 0.05em 0 var(--neon-purple); }
            15% { text-shadow: -0.05em -0.025em 0 var(--neon-pink), 0.025em 0.025em 0 var(--neon-blue), -0.05em -0.05em 0 var(--neon-purple); }
            49% { text-shadow: -0.05em -0.025em 0 var(--neon-pink), 0.025em 0.025em 0 var(--neon-blue), -0.05em -0.05em 0 var(--neon-purple); }
            50% { text-shadow: 0.025em 0.05em 0 var(--neon-pink), 0.05em 0 0 var(--neon-blue), 0 -0.05em 0 var(--neon-purple); }
            99% { text-shadow: 0.025em 0.05em 0 var(--neon-pink), 0.05em 0 0 var(--neon-blue), 0 -0.05em 0 var(--neon-purple); }
            100% { text-shadow: -0.025em 0 0 var(--neon-pink), -0.025em -0.025em 0 var(--neon-blue), -0.025em -0.05em 0 var(--neon-purple); }
        }

        /* Neon Name Effect */
        .name-container {
            position: relative;
            margin: 30px 0;
        }

        .name {
            font-size: clamp(3rem, 12vw, 8rem);
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            position: relative;
            animation: flicker 3s infinite alternate;
        }

        .name::before,
        .name::after {
            content: 'MARIA';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .name::before {
            color: var(--neon-pink);
            animation: neonFlicker 1.5s infinite alternate;
            z-index: -1;
        }

        .name::after {
            color: var(--neon-blue);
            animation: neonFlicker 2s infinite alternate-reverse;
            z-index: -2;
            filter: blur(10px);
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% {
                text-shadow:
                    0 0 4px #fff,
                    0 0 11px #fff,
                    0 0 19px #fff,
                    0 0 40px var(--neon-pink),
                    0 0 80px var(--neon-pink),
                    0 0 90px var(--neon-pink),
                    0 0 100px var(--neon-pink),
                    0 0 150px var(--neon-pink);
            }
            20%, 24%, 55% {
                text-shadow: none;
            }
        }

        @keyframes neonFlicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        /* Code Snippet Decoration */
        .code-snippet {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--neon-blue);
            border-radius: 8px;
            padding: 20px;
            margin: 30px auto;
            max-width: 500px;
            font-size: 14px;
            color: #00ff00;
            text-align: left;
            box-shadow: 0 0 20px rgba(5, 217, 232, 0.3);
            position: relative;
            overflow: hidden;
        }

        .code-snippet::before {
            content: '● ● ●';
            color: #ff5f56;
            font-size: 12px;
            letter-spacing: 5px;
            display: block;
            margin-bottom: 10px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .code-line {
            display: block;
            margin: 5px 0;
            opacity: 0;
            animation: typeIn 0.5s forwards;
        }

        .code-line:nth-child(1) { animation-delay: 0.5s; }
        .code-line:nth-child(2) { animation-delay: 1s; }
        .code-line:nth-child(3) { animation-delay: 1.5s; }
        .code-line:nth-child(4) { animation-delay: 2s; }
        .code-line:nth-child(5) { animation-delay: 2.5s; }

        @keyframes typeIn {
            to { opacity: 1; }
        }

        .keyword { color: var(--neon-pink); }
        .function { color: var(--neon-yellow); }
        .string { color: var(--neon-blue); }
        .comment { color: #666; font-style: italic; }

        /* Interactive Button */
        .compile-btn {
            background: transparent;
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 15px 40px;
            font-size: 18px;
            font-family: 'Courier New', Courier, monospace;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            margin-top: 20px;
            letter-spacing: 2px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .compile-btn:hover,
        .compile-btn:focus {
            background: var(--neon-blue);
            color: var(--dark-bg);
            box-shadow: 0 0 30px var(--neon-blue);
            outline: none;
        }

        .compile-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .compile-btn:hover::before,
        .compile-btn:focus::before {
            left: 100%;
        }

        .compile-btn:active {
            transform: scale(0.98);
        }

        /* Floating Particles */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--neon-pink);
            border-radius: 50%;
            pointer-events: none;
            animation: float 10s infinite;
            box-shadow: 0 0 10px var(--neon-pink);
            will-change: transform, opacity;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) translateX(100px); }
        }

        /* Cake ASCII Art */
        .ascii-cake {
            color: var(--neon-yellow);
            font-size: 12px;
            line-height: 1.2;
            margin-top: 20px;
            text-shadow: 0 0 10px var(--neon-yellow);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .code-snippet { font-size: 12px; padding: 15px; margin: 20px auto; }
            .compile-btn { padding: 12px 30px; font-size: 16px; }
            .container { padding: 20px; }
            .glitch { letter-spacing: 0.05em; }
        }

        /* Touch device optimizations */
        @media (hover: none) {
            .compile-btn:hover {
                background: transparent;
                color: var(--neon-blue);
                box-shadow: none;
            }
            .compile-btn:active {
                background: var(--neon-blue);
                color: var(--dark-bg);
                box-shadow: 0 0 30px var(--neon-blue);
            }
        }
    </style>
</head>
<body>
    <!-- Animated Grid Background -->
    <div class="grid" aria-hidden="true"></div>

    <!-- Binary Rain -->
    <div class="binary-rain" id="binaryRain" aria-hidden="true"></div>

    <!-- Floating Particles Container -->
    <div id="particles" aria-hidden="true"></div>

    <!-- Main Content -->
    <main class="container" role="main">
        <div class="glitch-wrapper">
            <h1 class="glitch" aria-label="Happy Birthday">HAPPY BIRTHDAY</h1>
        </div>

        <div class="name-container">
            <h2 class="name" aria-label="Maria">MARIA</h2>
        </div>

        <div class="code-snippet" role="img" aria-label="JavaScript code snippet">
            <span class="code-line"><span class="keyword">const</span> <span class="function">celebrate</span> = () => {</span>
            <span class="code-line">&nbsp;&nbsp;<span class="keyword">let</span> age = <span class="string">"++year"</span>;</span>
            <span class="code-line">&nbsp;&nbsp;<span class="keyword">return</span> <span class="string">"Happy Birthday ya Maria!"</span>;</span>
            <span class="code-line">};</span>
            <span class="code-line"><span class="comment">// a7la AI engineer</span></span>
        </div>

        <button class="compile-btn" 
                onclick="celebrate()" 
                onkeydown="if(event.key==='Enter'||event.key===' ')celebrate()"
                aria-label="Run celebration animation"
                role="button"
                tabindex="0">
            Run Celebration.exe
        </button>

        <pre class="ascii-cake" aria-hidden="true">
       , , , , , ,
       | | | | | |
    ~~~|~|~|~|~|~|~~~
       | | | | | |
      \         /
       `-------'
        </pre>
    </main>

    <script>
        // Polyfill for element.remove() for IE11
        if (!Element.prototype.remove) {
            Element.prototype.remove = function() {
                if (this.parentNode) {
                    this.parentNode.removeChild(this);
                }
            };
        }

        let intervals = [];
        let isTouch = window.matchMedia('(pointer: coarse)').matches;

        // Generate Binary Rain
        function createBinaryRain() {
            const container = document.getElementById('binaryRain');
            if (!container) return;

            // Clear existing
            container.innerHTML = '';

            const columns = Math.min(Math.floor(window.innerWidth / 20), 50); // Limit columns

            for (let i = 0; i < columns; i++) {
                const column = document.createElement('div');
                column.className = 'binary-column';
                column.style.left = i * 20 + 'px';
                column.style.animationDuration = (Math.random() * 3 + 2) + 's';
                column.style.animationDelay = Math.random() * 5 + 's';
                column.setAttribute('aria-hidden', 'true');

                let binaryText = '';
                for (let j = 0; j < 20; j++) {
                    binaryText += Math.random() > 0.5 ? '1' : '0';
                }
                column.textContent = binaryText;
                container.appendChild(column);
            }
        }

        // Generate Floating Particles
        function createParticles() {
            const container = document.getElementById('particles');
            if (!container) return;

            const colors = ['#ff2a6d', '#05d9e8', '#d300c5', '#f9f871'];
            const particleCount = isTouch ? 20 : 40; // Fewer particles on mobile

            const interval = setInterval(() => {
                if (document.hidden) return; // Pause when tab not visible

                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = '100%';
                const color = colors[Math.floor(Math.random() * colors.length)];
                particle.style.background = color;
                particle.style.boxShadow = '0 0 10px ' + color;
                particle.style.animationDuration = (Math.random() * 5 + 5) + 's';
                particle.setAttribute('aria-hidden', 'true');

                container.appendChild(particle);

                setTimeout(function() {
                    if (particle.parentNode) {
                        particle.parentNode.removeChild(particle);
                    }
                }, 10000);
            }, isTouch ? 800 : 500);

            intervals.push(interval);
        }

        // Celebration Function
        function celebrate() {
            const container = document.getElementById('particles');
            if (!container) return;

            const colors = ['#ff2a6d', '#05d9e8', '#d300c5', '#f9f871', '#ffffff'];
            const burstCount = isTouch ? 30 : 50;

            for (let i = 0; i < burstCount; i++) {
                setTimeout(function() {
                    const particle = document.createElement('div');
                    particle.style.position = 'absolute';
                    particle.style.width = '6px';
                    particle.style.height = '6px';
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    particle.style.background = color;
                    particle.style.borderRadius = '50%';
                    particle.style.left = '50%';
                    particle.style.top = '50%';
                    particle.style.pointerEvents = 'none';
                    particle.style.boxShadow = '0 0 10px ' + color;
                    particle.setAttribute('aria-hidden', 'true');

                    const angle = (Math.random() * 360) * (Math.PI / 180);
                    const velocity = Math.random() * 300 + 100;
                    const tx = Math.cos(angle) * velocity;
                    const ty = Math.sin(angle) * velocity;

                    particle.style.transition = 'all 1s ease-out';

                    container.appendChild(particle);

                    // Force reflow
                    particle.offsetHeight;

                    particle.style.transform = 'translate(' + tx + 'px, ' + ty + 'px)';
                    particle.style.opacity = '0';

                    setTimeout(function() {
                        if (particle.parentNode) {
                            particle.parentNode.removeChild(particle);
                        }
                    }, 1000);
                }, i * 20);
            }

            // Flash effect
            const flash = document.createElement('div');
            flash.style.position = 'fixed';
            flash.style.top = '0';
            flash.style.left = '0';
            flash.style.width = '100%';
            flash.style.height = '100%';
            flash.style.background = 'white';
            flash.style.opacity = '0.3';
            flash.style.pointerEvents = 'none';
            flash.style.zIndex = '100';
            flash.style.transition = 'opacity 0.5s';
            flash.setAttribute('aria-hidden', 'true');
            document.body.appendChild(flash);

            setTimeout(function() {
                flash.style.opacity = '0';
                setTimeout(function() {
                    if (flash.parentNode) {
                        flash.parentNode.removeChild(flash);
                    }
                }, 500);
            }, 100);
        }

        // Cleanup function
        function cleanup() {
            intervals.forEach(function(id) { clearInterval(id); });
            intervals = [];
        }

        // Initialize
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

        function init() {
            createBinaryRain();
            createParticles();
        }

        // Handle resize with debounce
        let resizeTimer;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(function() {
                createBinaryRain();
            }, 250);
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', cleanup);

        // Visibility API to pause animations when tab hidden
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                document.body.style.animationPlayState = 'paused';
            } else {
                document.body.style.animationPlayState = 'running';
            }
        });
    </script>
</body>
</html>
